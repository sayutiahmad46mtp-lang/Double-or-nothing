name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android platform
        run: |
          cordova create temp-app com.reme.casino "REME Casino"
          cd temp-app
          cordova platform add android
          cp -r ../www/* www/
          cd ..

      - name: Build APK
        working-directory: temp-app
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino.apk
          path: temp-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
