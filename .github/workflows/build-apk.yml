name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android

      - name: Copy www files
        run: |
          mkdir -p platforms/android/app/src/main/assets/www
          cp -r www/* platforms/android/app/src/main/assets/www/

      - name: Create debug keystore (for signing)
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Dev, O=REME, L=City, S=State, C=ID"

      - name: Build APK (Release)
        run: cordova build android --release -- --keystore=debug.keystore --storePassword=android --alias=debug --password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino.apk
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
          
